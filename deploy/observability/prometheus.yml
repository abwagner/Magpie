# Prometheus scrape config — Magpie Phase 1 / single-host.
# 365-day retention is set via the `--storage.tsdb.retention.time`
# CLI flag in docker-compose.yml (not configurable here).
#
# Scrape targets:
#   - prometheus itself          (sanity)
#   - qf-server      (port 3001) (M15-2 instrumentation — wired in QF-276)
#   - qf-supervisor  (port 3002) (M15-2 instrumentation — wired in QF-276)
#   - alloy          (port 12345) (Alloy's own /metrics)
#   - loki           (port 3100)  (Loki's own /metrics)
#
# host.docker.internal resolves to the host gateway (extra_hosts in
# docker-compose.yml handles the Linux case) — used when QF runs on the
# host (laptop dev `npm start`). On your-server.example.com the QF API
# runs as the `magpie-server` compose service (QF-201), reachable
# by its service DNS name on the shared compose network. Both targets are
# listed for qf-server; the one not present in a given environment simply
# shows DOWN and is ignored.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: magpie-dev

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: prometheus

  - job_name: qf-server
    metrics_path: /metrics
    static_configs:
      # host.docker.internal:3001 — QF on the host (laptop dev).
      # magpie-server:3001 — QF as a compose service (QF-201 deploy).
      - targets: ["host.docker.internal:3001", "magpie-server:3001"]
        labels:
          service: qf-server

  - job_name: qf-supervisor
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:3002"]
        labels:
          service: qf-supervisor

  - job_name: alloy
    metrics_path: /metrics
    static_configs:
      - targets: ["alloy:12345"]
        labels:
          service: alloy

  - job_name: loki
    metrics_path: /metrics
    static_configs:
      - targets: ["loki:3100"]
        labels:
          service: loki

# Alerting rules are not loaded today (per 2026-05-20 decision — no
