version: "3.8"

services:
  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222" # Client connections
      - "8222:8222" # HTTP monitoring (/varz, /jsz)
    command: ["-js", "-sd", "/data", "-m", "8222"]
    volumes:
      - nats-data:/data
    restart: unless-stopped

  # ── QF API server (QF-201 / M10-7, Option B) ────────────────────────
  # The always-on, write-capable QF API + state WebSocket on port 3001.
  # Per the deployment-topology TDD (docs/tdd/deployment-topology.md §4)
  # this is the single process that holds the MinIO write key (M10-6
  # single-writer target). The scheduler / cron container's
  # `POST /api/write-jobs` lines (M10-5) reach it over this network.
  #
  # OPERATOR NOTE: this service is meant to run on your-server.example.com
  # (a.k.a. swagner-server). On a dev laptop you normally use `npm start`
  # instead — bringing this up locally would race the laptop server for
  # port 3001 and the DuckDB file. See docs/RUNBOOK.md §"QF server
  # deployment (M10-7)". Secrets arrive via env_file (.env), never baked
  # into the image.
  magpie-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    image: magpie-server:latest
    ports:
      # 3001 must be reachable by the scheduler/cron container and by the
      # Prometheus/Alloy scrapers (deploy/observability/*, job qf-server).
      - "3001:3001"
    env_file:
      # Provides DATA_URI, S3_* (write key on the server), NATS_URL,
      # WRITE_JOB_TOKEN_PATH, FMP_API_KEY, SLACK_WEBHOOK_URL, etc. The
      # file is gitignored; copy from .env.example and fill in. The
      # `environment` block below pins the non-secret prod invariants.
      - .env
    environment:
      # `environment` overrides any same-key value from env_file, so these
      # pin the prod invariants regardless of what a copied .env carries.
      - APP_ENV=prod
      - TRADING_MODE=${TRADING_MODE:-paper}
      - PORT=3001
      # In-compose NATS service hostname. Defaults to the `nats` service;
      # override via a NATS_URL in the shell/.env that runs `compose up`.
      - NATS_URL=${NATS_URL:-nats://nats:4222}
      # portfolio.duckdb is single-writer and file-based; keep it on the
      # mounted volume so it survives container rebuilds.
      - CATALOG_DB_PATH=/data/portfolio.duckdb
      # Structured server log for Alloy to tail (deploy/observability).
      - LOG_FILE=/data/logs/server.log
    volumes:
      # Persistent home for the canonical portfolio.duckdb + the
      # write-job token store + structured logs. Survives `up -d --build`.
      - magpie-server-data:/data
    depends_on:
      - nats
    healthcheck:
      # /api/status is the existing liveness route (server/index.ts).
      test: ["CMD", "curl", "-fsS", "http://localhost:3001/api/status"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  # ── Observability stack (M15-1) ─────────────────────────────────────
  # Opt-in via the `observability` profile so a default `docker-compose
  # up` keeps the dev surface minimal:
  #   docker-compose --profile observability up -d
  #   npm run dev:observability
  # Phase 1: single-host, local-disk retention (365 days per the
  # 2026-05-20 decision). Upgrade path to MinIO / S3 / k8s is noted
  # inline in each config file. See docs/RUNBOOK.md §12.

  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:v2.55.1
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=8760h # 365 days
      - --web.enable-lifecycle
    volumes:
      - ./deploy/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      # Linux compatibility — `host.docker.internal` resolves on macOS /
      # Windows out of the box, but Linux needs the explicit gateway map
      # so the scrape config can reach :3001/:3002 on the host.
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  loki:
    profiles: ["observability"]
    image: grafana/loki:3.2.1
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./deploy/observability/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    restart: unless-stopped

  alloy:
    profiles: ["observability"]
    image: grafana/alloy:v1.5.0
    ports:
      - "12345:12345" # /metrics + Alloy UI
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ./deploy/observability/alloy-config.alloy:/etc/alloy/config.alloy:ro
      # QF logs to ./data/logs/{server,supervisor}.log when LOG_FILE is
      # set on the host process (see RUNBOOK §12). Alloy tails them.
      - ./data/logs:/var/qf-logs:ro
      - alloy-data:/var/lib/alloy/data
    depends_on:
      - loki
    restart: unless-stopped

  grafana:
    profiles: ["observability"]
    image: grafana/grafana:11.4.0
    ports:
      - "3000:3000"
    environment:
      # Default dev credentials; rotate before any non-local exposure.
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - ./deploy/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      # Dashboard JSON lives apart from the provider config (QF-277); the
      # provider's options.path points here, not at the provisioning dir.
      - ./deploy/observability/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

volumes:
  nats-data:
  magpie-server-data:
  prometheus-data:
  loki-data:
  alloy-data:
  grafana-data:
