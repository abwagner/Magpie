version: "3.8"

services:
  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222" # Client connections
      - "8222:8222" # HTTP monitoring (/varz, /jsz)
    command: ["-js", "-sd", "/data", "-m", "8222"]
    volumes:
      - nats-data:/data
    restart: unless-stopped

  # ── Observability stack (M15-1) ─────────────────────────────────────
  # Opt-in via the `observability` profile so a default `docker-compose
  # up` keeps the dev surface minimal:
  #   docker-compose --profile observability up -d
  #   npm run dev:observability
  # Phase 1: single-host, local-disk retention (365 days per the
  # 2026-05-20 decision). Upgrade path to MinIO / S3 / k8s is noted
  # inline in each config file. See docs/RUNBOOK.md §12.

  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:v2.55.1
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=8760h # 365 days
      - --web.enable-lifecycle
    volumes:
      - ./deploy/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      # Linux compatibility — `host.docker.internal` resolves on macOS /
      # Windows out of the box, but Linux needs the explicit gateway map
      # so the scrape config can reach :3001/:3002 on the host.
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  loki:
    profiles: ["observability"]
    image: grafana/loki:3.2.1
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./deploy/observability/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    restart: unless-stopped

  alloy:
    profiles: ["observability"]
    image: grafana/alloy:v1.5.0
    ports:
      - "12345:12345" # /metrics + Alloy UI
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ./deploy/observability/alloy-config.alloy:/etc/alloy/config.alloy:ro
      # QF logs to ./data/logs/{server,supervisor}.log when LOG_FILE is
      # set on the host process (see RUNBOOK §12). Alloy tails them.
      - ./data/logs:/var/qf-logs:ro
      - alloy-data:/var/lib/alloy/data
    depends_on:
      - loki
    restart: unless-stopped

  grafana:
    profiles: ["observability"]
    image: grafana/grafana:11.4.0
    ports:
      - "3000:3000"
    environment:
      # Default dev credentials; rotate before any non-local exposure.
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - ./deploy/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

volumes:
  nats-data:
  prometheus-data:
  loki-data:
  alloy-data:
  grafana-data:
