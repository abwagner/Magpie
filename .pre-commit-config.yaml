# Pre-commit hooks for Magpie.
# Install with: pip install pre-commit && pre-commit install
# Pattern adapted from a standard fullstack pre-commit configuration.

repos:
  # ── Hygiene ──────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^docs/design_handoff_magpie/
      - id: end-of-file-fixer
        exclude: ^docs/design_handoff_magpie/
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
        args: ["--maxkb=1024"]

  # ── ESLint (JS/TS/JSX/TSX) ───────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.19.0
    hooks:
      - id: eslint
        types_or: [javascript, ts, jsx, tsx]
        additional_dependencies:
          - eslint@10.2.0
          - "@eslint/js@10.0.1"
          - "@typescript-eslint/eslint-plugin@8.58.1"
          - "@typescript-eslint/parser@8.58.1"
          - typescript-eslint@8.58.1
          - eslint-config-prettier@10.1.8

  # ── Prettier (formatting) ────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [javascript, ts, jsx, tsx, json, yaml, markdown]
        exclude: ^docs/design_handoff_magpie/

  # ── tsc --noEmit (project-wide type check) ───────────────────────
  # Local hook because tsc must see the whole project, not single files.
  # pass_filenames: false stops pre-commit from passing per-file args.
  - repo: local
    hooks:
      - id: tsc-noemit
        name: tsc --noEmit
        entry: npx tsc --noEmit
        language: system
        types_or: [ts, tsx]
        pass_filenames: false

      # ── Rust (rustfmt on staged .rs files in the core/ workspace) ────
      # Local hook so the workspace's pinned toolchain (rust-toolchain.toml)
      # is what runs. Clippy stays in CI (`.github/workflows/rust.yml`) so
      # the pre-commit step stays fast; cargo fmt on a small workspace is
      # near-instant. pass_filenames: false because `cargo fmt --all`
      # operates over the workspace, not per-file.
      - id: cargo-fmt
        name: cargo fmt (core workspace)
        entry: bash -c 'cd core && cargo fmt --all'
        language: system
        types: [rust]
        pass_filenames: false

  # ── Ruff (lint + format on staged .py files in research/) ────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
